name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Action Repl.ai Environment

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Build Docker Image
        run: docker build -t arai-server backend/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
      
      - name: Tag and Push Docker Image to Docker Hub
        run: |
          docker tag arai-server ${{ secrets.DOCKER_HUB_USERNAME }}/arai-server:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/arai-server:latest

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Run Tests
        run: |
          # Add your test commands here
          echo "Running tests..."

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    environment: Action Repl.ai Environment

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2
      
      - name: SSH Deploy to Digital Ocean
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            CONTAINER_NAME="arai-container"
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME|| true
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/arai-server:latest
            docker run -d --name $CONTAINER_NAME -p 8080:5000 ${{ secrets.DOCKER_HUB_USERNAME }}/arai-server:latest
