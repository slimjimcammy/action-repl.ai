name: AWS Lambda Deploy

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    build:
        environment: Action Repl.ai Environment

        runs-on: ubuntu-latest
        env:
            ECR_IMAGE_TAG: latest
            AWS_DEFAULT_REGION: us-east-1

        steps:
            - name: checkout
              uses: actions/checkout@v2

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v1
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_DEFAULT_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v1

            - name: Build, tag, and push image to Amazon ECR
              id: build-image
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  ECR_REPOSITORY: arai-server-ecr
              run: |
                  docker build -t arai-server-ecr:latest -f backend/server/Dockerfile backend/server/
                  docker tag arai-server-ecr:latest ${{ AWS_REGISTRY }}/arai-server-ecr:latest
                  docker push ${{ AWS_REGISTRY }}/arai-server-ecr:latest

    deploy:
        environment: Action Repl.ai Environment
        runs-on: ubuntu-latest
        needs: [build]

        steps:
            - name: Deploy to AWS Lambda
              run: |
                  aws lambda update-function-code \
                  --function-name arai-server-lambda --image-uri ${{ AWS_REGISTRY }}/arai-server-ecr:latest
              env:
                  AWS_LAMBDA_FUNC_NAME: arai-server-lambda
                  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  AWS_DEFAULT_REGION: us-east-1
